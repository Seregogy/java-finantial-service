services:
  postgres:
    image: postgres:16-alpine
    container_name: auto-loan-service-db
    environment:
      POSTGRES_DB: auto-loan-service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auto-loan-service"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  flyway:
    image: flyway/flyway:latest-alpine
    container_name: auto-loan-service-flyway
    command: -url=jdbc:postgresql://postgres:5432/auto-loan-service -user=postgres -password=postgres -connectRetries=60 migrate
    volumes:
      - ./persistence/src/main/java/com/financial/loan/persistence/migration/postgres:/flyway/sql  # Папка с вашими миграциями
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: "no"  # Выполнится один раз и остановится

  adminer:
    image: adminer
    container_name: auto-loan-service-adminer
    ports:
      - "8085:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - app-network

networks:
  app-network:
    driver: bridge